version: '3.9'

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projet-rodrigo-db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d projet_rodrigo']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
